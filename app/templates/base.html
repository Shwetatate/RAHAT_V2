<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rahat{% endblock %}</title>

  <!-- ===================== CSS LIBRARIES ===================== -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- ===================== GOOGLE FONTS ===================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ===================== CUSTOM CSS ===================== -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- ===================== PAGE EXTRA HEAD ===================== -->
  {% block head_extra %}{% endblock %}
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav id="rahat-navbar" class="navbar navbar-expand-lg rahat-navbar fixed-top shadow-sm">
    <div class="container">

      <!-- Brand / Logo -->
      <a class="navbar-brand rahat-logo fw-bold d-flex align-items-center gap-2" href="{{ url_for('index') }}">
        <span class="logo-icon">🌾</span>
        <span class="logo-text">Rahat</span>
      </a>

      <!-- Mobile Toggle -->
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#rahatNav" aria-controls="rahatNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Nav Links -->
      <div class="collapse navbar-collapse justify-content-end" id="rahatNav">
        <ul class="navbar-nav align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link rahat-nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link rahat-nav-link {% if request.endpoint == 'crop' %}active{% endif %}" href="{{ url_for('crop') }}">
              <i class="bi bi-flower1 me-1"></i>Crop <span class="devanagari">पीक</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link rahat-nav-link {% if request.endpoint == 'fertilizer' %}active{% endif %}" href="{{ url_for('fertilizer') }}">
              <i class="bi bi-droplet me-1"></i>Fertilizer <span class="devanagari">खत</span>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link rahat-nav-link {% if request.endpoint == 'disease' %}active{% endif %}" href="{{ url_for('disease') }}">
              <i class="bi bi-search me-1"></i>Disease <span class="devanagari">रोग</span>
            </a>
          </li>

        </ul>
      </div>
      <!-- End Nav Links -->

    </div>
  </nav>
  <!-- ===================== END NAVBAR ===================== -->


  <!-- ===================== MAIN CONTENT ===================== -->
  <main class="rahat-main">
    {% block content %}{% endblock %}
  </main>
  <!-- ===================== END MAIN CONTENT ===================== -->


  <!-- ===================== FOOTER ===================== -->
  <footer class="rahat-footer text-center py-4 mt-auto">
    <div class="container">
      <p class="mb-1 small fw-500">🌱 Built for farmers of India</p>
      <p class="mb-0 small text-muted">Rahat © 2025 — AI Farming Assistant</p>
    </div>
  </footer>
  <!-- ===================== END FOOTER ===================== -->


  <!-- ===================== JS LIBRARIES ===================== -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- ===================== PAGE SCRIPTS ===================== -->
  {% block page_scripts %}{% endblock %}

</body>
</html>
